# Problem Taxonomy for Software Patterns Skills
# Indexes all 147 files across 7 skills for semantic problem matching
#
# Structure:
#   id: unique-kebab-case-id
#   keywords: [terms for semantic matching]
#   question: "Problem formulation"
#   skills: [{skill, file, relevance: primary|secondary}]
#   constraints: [considerations for choosing this solution]
#   related: [cross-references to related entries]
#
# Coverage: 147 files across 7 skills
#   - gof-patterns: 25 files (23 patterns + SKILL.md + pattern-selection.md)
#   - clrs-algorithms: 40 files (37 data structures + 3 guides)
#   - clean-code: 14 files (5 SOLID + 8 practices + SKILL.md)
#   - pragmatic-programmer: 19 files (7 principles + 11 practices + SKILL.md)
#   - ddia: 21 files (20 topics + SKILL.md)
#   - ddd: 15 files (14 concepts + SKILL.md)
#   - sicp: 13 files (12 topics + SKILL.md)

problems:
  # ===========================================================================
  # OBJECT CREATION PROBLEMS (GoF Creational)
  # ===========================================================================

  - id: create-families-of-objects
    keywords: ["factory", "family", "related objects", "product family", "platform", "theme", "toolkit", "widget set", "cross-platform", "ui kit"]
    question: "Need to create families of related objects without specifying concrete classes?"
    skills:
      - skill: gof-patterns
        file: gof-creational/abstract-factory.md
        relevance: primary
      - skill: ddd
        file: patterns/factories.md
        relevance: secondary
    constraints:
      - "Products must be used together consistently"
      - "System should be independent of how products are created"
      - "Good for cross-platform UI toolkits"
    related: [create-single-product, configure-complex-object, create-domain-objects]

  - id: create-single-product
    keywords: ["factory", "instantiation", "product", "create object", "virtual constructor", "polymorphic creation", "subclass decides"]
    question: "Need to let subclasses decide which class to instantiate?"
    skills:
      - skill: gof-patterns
        file: gof-creational/factory-method.md
        relevance: primary
      - skill: ddd
        file: patterns/factories.md
        relevance: secondary
    constraints:
      - "Class cannot anticipate the class of objects it must create"
      - "Subclasses should specify objects to create"
      - "Simpler than Abstract Factory for single products"
    related: [create-families-of-objects, template-algorithm, create-domain-objects]

  - id: configure-complex-object
    keywords: ["builder", "construction", "step by step", "fluent", "complex object", "telescoping constructor", "immutable", "configuration"]
    question: "Need to construct complex objects step by step with different representations?"
    skills:
      - skill: gof-patterns
        file: gof-creational/builder.md
        relevance: primary
      - skill: clean-code
        file: practices/functions.md
        relevance: secondary
    constraints:
      - "Construction process must allow different representations"
      - "Object has many optional parameters"
      - "Avoid telescoping constructors"
    related: [create-families-of-objects, function-design]

  - id: clone-existing-object
    keywords: ["prototype", "clone", "copy", "duplicate", "deep copy", "shallow copy", "registry", "template instance"]
    question: "Need to create objects by copying an existing instance?"
    skills:
      - skill: gof-patterns
        file: gof-creational/prototype.md
        relevance: primary
    constraints:
      - "Classes to instantiate are specified at runtime"
      - "Avoiding parallel hierarchy of factories"
      - "Need to handle deep vs shallow copy semantics"
    related: [create-single-product, object-caching]

  - id: ensure-single-instance
    keywords: ["singleton", "global", "one instance", "shared state", "registry", "configuration", "global access"]
    question: "Need to ensure a class has only one instance with global access?"
    skills:
      - skill: gof-patterns
        file: gof-creational/singleton.md
        relevance: primary
      - skill: sicp
        file: modularity/assignment-and-state.md
        relevance: secondary
    constraints:
      - "Consider thread safety implications"
      - "Often considered an anti-pattern; evaluate alternatives first"
      - "Makes testing harder due to global state"
      - "Consider dependency injection as alternative"
    related: [manage-shared-state, dependency-injection]

